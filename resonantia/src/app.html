<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070a12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Resonantia" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <title>Resonantia</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Departure+Mono&family=Fraunces:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        background: #070a12;
      }

      html {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: #070a12;
        overflow: hidden;
        overscroll-behavior: none;
      }

      body {
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        margin: 0;
        padding: 0;
        background: #070a12;
        overflow: hidden;
        overscroll-behavior: none;
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("%sveltekit.assets%/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
